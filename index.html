<h1 id="wt2c">wt2c</h1>
<p>wt2c (web throw-to-catch) is a service that compress documents thrown (sent to wt2c) into a folder, and then decompress said documents when caught (received) on the wt2c/throw directory. </p>
<p>wt2c aims to reduce storage taken up by handful of documents and instead displays them on a wt2c iframe.</p>
<p><code>throw: WIP</code>
<code>catch: -id</code></p>
